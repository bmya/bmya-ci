name: Build custom OCA CI images

on:
  push:
    branches: [main]
    paths:
      - "docker/oca-ci/**"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.version }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - version: "17.0"
            python: "py3.10"
          - version: "18.0"
            python: "py3.10"
          - version: "19.0"
            python: "py3.10"

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.version }}
        uses: docker/build-push-action@v5
        with:
          context: docker/oca-ci/${{ matrix.version }}
          push: true
          tags: |
            ghcr.io/bmya/oca-ci/${{ matrix.python }}-odoo${{ matrix.version }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
