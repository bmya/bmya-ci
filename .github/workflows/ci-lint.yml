name: CI Lint (reusable)

# Reusable workflow for Odoo module repos (odoo-bmya, bmya-enterprise, etc.).
# Called from each repo's .github/workflows/ci.yml on pull_request events.
#
# Produces five GitHub Checks on every PR:
#   - ci/commits   → PR must have exactly 1 commit (squash discipline)
#   - ci/odoolint  → OCA odoo-pre-commit-hooks (manifests, XML, deprecations)
#   - ci/security  → ir.model.access.csv completeness (all models have access rules)
#   - ci/style     → flake8 + isort (PEP8 + Odoo conventions)
#   - ci/branding  → manifest 'author' / 'website' canonicalization (BMYA repos only)
#
# On pull_request: checks only modules/files touched by the PR.
# On workflow_dispatch: checks the entire repo.
#
# robbmya bypass flags: r+ override=commits|lint|security|style|branding

on:
  workflow_call:
    inputs:
      odoo_version:
        description: "Odoo version (e.g. 17.0, 18.0, 19.0, master)"
        required: true
        type: string

jobs:
  commits:
    name: ci/commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check single commit
        env:
          COMMITS: ${{ github.event.pull_request.commits }}
        run: |
          if [ "$COMMITS" -gt 1 ]; then
            echo "❌ PR has $COMMITS commits. Please squash to 1 commit before merging."
            echo ""
            echo "   git rebase -i HEAD~$COMMITS"
            echo ""
            echo "Or from your branch:"
            echo "   git reset --soft \$(git merge-base HEAD origin/${{ github.base_ref }})"
            echo "   git commit -m 'your message'"
            exit 1
          fi
          echo "✓ PR has exactly 1 commit"

  odoolint:
    name: ci/odoolint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install oca-odoo-pre-commit-hooks
        run: |
          python -m pip install --upgrade pip
          pip install oca-odoo-pre-commit-hooks

      - name: Run oca checks
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          # On pull_request: check only modules touched by the PR.
          # On workflow_dispatch / push: check all modules.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if [ -z "$BASE_SHA" ]; then
              echo "❌ BASE_SHA is empty in pull_request context; cannot determine PR scope."
              exit 1
            fi
            git fetch origin "$BASE_SHA" --depth=1
            CHANGED=$(git diff --name-only "$BASE_SHA..HEAD" | grep -oP '^[^/]+' | sort -u)
            MODULES=""
            for mod in $CHANGED; do
              [ -f "$mod/__manifest__.py" ] && MODULES="$MODULES $mod"
            done
          else
            MODULES=$(find . -maxdepth 1 -name "__manifest__.py" -exec dirname {} \; 2>/dev/null || true)
            if [ -z "$MODULES" ]; then
              MODULES=$(find . -name "__manifest__.py" -not -path "*/.*" -exec dirname {} \;)
            fi
          fi

          if [ -z "$MODULES" ]; then
            echo "No Odoo modules to check, skipping"
            exit 0
          fi

          echo "Checking modules: $MODULES"

          # Checks disabled because they are incompatible with official Odoo patterns:
          # - xml-deprecated-data-node: Odoo/Enterprise still uses <odoo><data noupdate="1">
          # - xml-id-position-first: attribute ordering is cosmetic, not enforced by Odoo
          # - xml-header-wrong: Odoo uses utf-8 (lowercase, no space), OCA wants UTF-8 with space
          # - xml-dangerous-qweb-replace-low-priority: valid when devs know what they're doing
          DISABLED="xml-deprecated-data-node|xml-id-position-first|xml-header-wrong|xml-dangerous-qweb-replace-low-priority"

          # Run checks, capture output (always exit 0 here so we can filter)
          set +e
          output=$(oca-checks-odoo-module $MODULES 2>&1)
          set -e

          # Show full output for context
          echo "$output"

          # Fail only on non-disabled violations
          # Violation lines look like: path/to/file.xml:10: check-slug-name <message>
          if echo "$output" | grep -vE "^[^:]+:[0-9]+: ($DISABLED) " | grep -qE "^[^:]+:[0-9]+: [a-z]"; then
            exit 1
          fi
          echo "✓ oca checks passed (disabled: $DISABLED)"

  security:
    name: ci/security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check ir.model.access.csv completeness
        run: |
          python3 - <<'PYEOF'
          import os, re, sys, csv, subprocess

          errors = []

          # On pull_request: only check modules touched by the PR.
          event = os.environ.get("GITHUB_EVENT_NAME", "")
          base_sha = os.environ.get("BASE_SHA", "")

          touched_modules = None
          if event == "pull_request":
              if not base_sha:
                  print("❌ BASE_SHA is empty in pull_request context; cannot determine PR scope.")
                  sys.exit(1)
              # Ensure the base commit is fetched, then compute touched modules.
              # Failing here is intentional — silent fallback to full scan would hide the bug.
              subprocess.check_call(["git", "fetch", "origin", base_sha, "--depth=1"])
              diff = subprocess.check_output(
                  ["git", "diff", "--name-only", f"{base_sha}..HEAD"]
              ).decode()
              touched_modules = set()
              for line in diff.splitlines():
                  top = line.split("/")[0]
                  if os.path.isfile(os.path.join(top, "__manifest__.py")):
                      touched_modules.add(top)

          for root, dirs, files in os.walk('.'):
              dirs[:] = sorted(d for d in dirs if not d.startswith('.') and d != '__pycache__')
              if '__manifest__.py' not in files:
                  continue
              module = os.path.basename(root)

              # Skip modules not touched by this PR (when on pull_request)
              if touched_modules is not None and module not in touched_modules:
                  continue

              # Collect concrete model names (_name set, not abstract or transient)
              models = set()
              for dirpath, _, pyfiles in os.walk(root):
                  for fn in pyfiles:
                      if not fn.endswith('.py'):
                          continue
                      try:
                          content = open(os.path.join(dirpath, fn)).read()
                      except Exception:
                          continue
                      # Find classes that declare _name
                      for cls_match in re.finditer(
                          r'class\s+\w+\s*\([^)]*\):\s*((?:(?!\nclass\s).)*)',
                          content, re.DOTALL
                      ):
                          body = cls_match.group(1)
                          name_m = re.search(r'_name\s*=\s*["\']([a-z][a-z0-9_.]+)["\']', body)
                          if not name_m:
                              continue
                          model_name = name_m.group(1)
                          # Skip abstract and transient models
                          if re.search(r'_abstract\s*=\s*True', body):
                              continue
                          if re.search(r'_transient\s*=\s*True', body):
                              continue
                          # Skip extensions: _name = 'X' + _inherit = 'X' (or _inherit = ['X', ...])
                          # These add fields/methods to existing models and don't need new access rules
                          inherit_m = re.search(r'_inherit\s*=\s*["\']([a-z][a-z0-9_.]+)["\']', body)
                          if inherit_m and inherit_m.group(1) == model_name:
                              continue
                          inherit_list_m = re.search(r'_inherit\s*=\s*\[([^\]]+)\]', body)
                          if inherit_list_m:
                              inherited = re.findall(r'["\']([a-z][a-z0-9_.]+)["\']', inherit_list_m.group(1))
                              if model_name in inherited:
                                  continue
                          models.add(model_name)

              if not models:
                  continue

              # Parse ir.model.access.csv
              access_file = os.path.join(root, 'security', 'ir.model.access.csv')
              covered = set()
              if os.path.exists(access_file):
                  with open(access_file, newline='') as f:
                      reader = csv.DictReader(f)
                      for row in reader:
                          # Support both 'model_id:id' and 'model_id/id' header formats
                          field = row.get('model_id:id') or row.get('model_id/id') or ''
                          # 'model_account_move' -> 'account.move'
                          name = re.sub(r'^model_', '', field).replace('_', '.')
                          covered.add(name)

              for model in sorted(models):
                  if model not in covered:
                      errors.append(f"  {module}: '{model}' missing from security/ir.model.access.csv")

          if errors:
              print("❌ Models without access rules:")
              for e in errors:
                  print(e)
              sys.exit(1)
          print("✓ All models have ir.model.access.csv entries")
          PYEOF
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}

  style:
    name: ci/style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install flake8 isort

      - name: Resolve files to check
        id: scope
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if [ -z "$BASE_SHA" ]; then
              echo "❌ BASE_SHA is empty in pull_request context; cannot determine PR scope."
              exit 1
            fi
            git fetch origin "$BASE_SHA" --depth=1
            # Collect Python files changed by this PR that live inside Odoo modules.
            # --diff-filter=d excludes deletions so linters don't try to read missing files.
            FILES=$(git diff --name-only --diff-filter=d "$BASE_SHA..HEAD" \
              | grep '\.py$' \
              | while read f; do
                  mod=$(echo "$f" | cut -d/ -f1)
                  [ -f "$mod/__manifest__.py" ] && [ -f "$f" ] && echo "$f"
                done || true)
            echo "files<<EOF" >> "$GITHUB_OUTPUT"
            echo "$FILES" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "files=" >> "$GITHUB_OUTPUT"
          fi

      - name: flake8
        run: |
          FILES="${{ steps.scope.outputs.files }}"
          if [ -n "$FILES" ]; then
            # PR mode: check only changed .py files
            if [ -f .flake8 ]; then
              echo "$FILES" | xargs flake8
            else
              echo "$FILES" | xargs flake8 --max-line-length=120 --extend-ignore=E501,W503,W504 --exclude=__manifest__.py
            fi
          else
            # Full scan (workflow_dispatch / push)
            if [ -f .flake8 ]; then
              flake8 .
            else
              flake8 --max-line-length=120 --extend-ignore=E501,W503,W504 --exclude=__manifest__.py,.git,__pycache__ .
            fi
          fi

      - name: isort
        run: |
          FILES="${{ steps.scope.outputs.files }}"
          if [ -n "$FILES" ]; then
            if [ -f .isort.cfg ] || [ -f pyproject.toml ]; then
              echo "$FILES" | xargs isort --check-only --diff
            else
              echo "$FILES" | xargs isort --check-only --diff --profile=black
            fi
          else
            if [ -f .isort.cfg ] || [ -f pyproject.toml ]; then
              isort --check-only --diff .
            else
              isort --check-only --diff --profile=black .
            fi
          fi

  branding:
    name: ci/branding
    runs-on: ubuntu-latest
    # BMYA-only check: enforces canonical author/website in __manifest__.py.
    # Add new BMYA repos to this list as they appear.
    if: contains(fromJSON('["odoo-bmya","bmya-enterprise","bmya-enterprise-release","bmya-tools","bmya-ai","bmya-crm","odoo-partner-tools"]'), github.event.repository.name)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate manifest author/website
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          python3 - <<'PYEOF'
          import os, re, sys, ast, subprocess

          REQUIRED_AUTHOR = "Blanco Martín y Asociados SpA"
          REQUIRED_WEBSITE = "https://www.bmya.cl"
          # Forbidden ways of naming BMYA — any occurrence triggers a violation,
          # even if the canonical form is also present (no mixing nomenclatures).
          FORBIDDEN_AUTHOR_PATTERNS = [
              (r"\bBMYA\b",                          "use 'Blanco Martín y Asociados SpA' instead of 'BMYA'"),
              (r"\bBMyA\b",                          "use 'Blanco Martín y Asociados SpA' instead of 'BMyA'"),
              (r"\bbmya\b",                          "use 'Blanco Martín y Asociados SpA' instead of 'bmya'"),
              (r"Blanco Mart[ií]n\s*&\s*Asociados",  "use 'Blanco Martín y Asociados SpA' (use 'y' instead of '&'; include 'SpA')"),
              (r"\bBlanco Martin\b",                 "use 'Blanco Martín y Asociados SpA' (must have tilde in 'Martín')"),
          ]

          event = os.environ.get("GITHUB_EVENT_NAME", "")
          base_sha = os.environ.get("BASE_SHA", "")

          touched_modules = None
          if event == "pull_request":
              if not base_sha:
                  print("❌ BASE_SHA is empty in pull_request context; cannot determine PR scope.")
                  sys.exit(1)
              subprocess.check_call(["git", "fetch", "origin", base_sha, "--depth=1"])
              diff = subprocess.check_output(
                  ["git", "diff", "--name-only", f"{base_sha}..HEAD"]
              ).decode()
              touched_modules = set()
              for line in diff.splitlines():
                  top = line.split("/")[0]
                  if os.path.isfile(os.path.join(top, "__manifest__.py")):
                      touched_modules.add(top)
              if not touched_modules:
                  print("No modules touched by this PR — skipping branding check.")
                  sys.exit(0)

          errors = []

          for root, dirs, files in os.walk("."):
              dirs[:] = sorted(d for d in dirs if not d.startswith(".") and d != "__pycache__")
              if "__manifest__.py" not in files:
                  continue
              module = os.path.basename(root)
              if touched_modules is not None and module not in touched_modules:
                  continue

              manifest_path = os.path.join(root, "__manifest__.py")
              try:
                  manifest = ast.literal_eval(open(manifest_path).read())
              except (SyntaxError, ValueError) as e:
                  errors.append(
                      f"{manifest_path}: cannot parse as literal dict ({e}); "
                      f"rewrite manifest as a plain dict literal"
                  )
                  continue
              if not isinstance(manifest, dict):
                  errors.append(f"{manifest_path}: top-level value is not a dict")
                  continue

              author = manifest.get("author", "") or ""
              website = manifest.get("website", "") or ""

              if REQUIRED_AUTHOR not in author:
                  errors.append(
                      f"{manifest_path}: 'author' must contain '{REQUIRED_AUTHOR}' "
                      f"(got: {author!r})"
                  )
              for pat, msg in FORBIDDEN_AUTHOR_PATTERNS:
                  if re.search(pat, author):
                      errors.append(
                          f"{manifest_path}: 'author' contains forbidden form — {msg} "
                          f"(got: {author!r})"
                      )

              if website != REQUIRED_WEBSITE:
                  errors.append(
                      f"{manifest_path}: 'website' must be exactly '{REQUIRED_WEBSITE}' "
                      f"(got: {website!r})"
                  )

          if errors:
              print("❌ Branding violations:")
              for e in errors:
                  print(f"  {e}")
              sys.exit(1)
          print(f"✓ Branding OK ({'PR-scoped' if touched_modules else 'full'} scan)")
          PYEOF
